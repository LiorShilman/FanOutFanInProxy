proxy:
  # ═══════════════════════════════════════════════════════════════════════════
  # FOFI AIR — 3-Machine UDP Test  (Machine B)
  #
  # ACCC->GCCC (forward):
  #   A ──:5000──► B ──:5200 (LOS)──► C ──:7000──► A
  #                  ──:5202 (SNV)──►
  #
  # GCCC->ACCC (reverse):
  #   A ──:7100──► C ──:5210 (LOS)──► B ──:5001──► A
  #                  ──:5212 (SNV)──►
  #
  # !! החלף MACHINE_A_IP ב-IP של Machine A !!
  # !! החלף MACHINE_C_IP ב-IP של Machine C !!
  # ═══════════════════════════════════════════════════════════════════════════

  channels:
    # ── ACCC->GCCC (forward) ─────────────────────────────────────────────────
    - name: ACCC_IN
      upstream:
        protocol: Udp
        mode: Server
        listenIp: "0.0.0.0"
        port: 5000              # Machine A שולח לכאן (ACCC)

    - name: LOS_UPPER
      downstream:
        protocol: Udp
        mode: Client
        host: "192.168.1.206"   # <-- IP של Machine C
        port: 5200

    - name: SUPERNOVA_AIR
      downstream:
        protocol: Udp
        mode: Client
        host: "192.168.1.206"   # <-- IP של Machine C
        port: 5202

    # ── GCCC->ACCC (reverse) ─────────────────────────────────────────────────
    - name: LOS_REV
      upstream:
        protocol: Udp
        mode: Server
        listenIp: "0.0.0.0"
        port: 5210              # Machine C שולח לכאן (LOS reverse)

    - name: SNV_REV
      upstream:
        protocol: Udp
        mode: Server
        listenIp: "0.0.0.0"
        port: 5212              # Machine C שולח לכאן (SNV reverse)

    - name: ACCC_OUT
      downstream:
        protocol: Udp
        mode: Client
        host: "192.168.1.200"   # <-- IP של Machine A
        port: 5001              # Machine A מקשיב כאן (ACCC receive)

  downstreams: []

  routing:
    rules:
      # ACCC->GCCC (forward)
      - from: "ACCC_IN:Upstream"
        to: ["LOS_UPPER:Downstream"]    # LOS פעיל כברירת מחדל

      - from: "LOS_UPPER:Upstream"
        to: ["ACCC_IN:Downstream"]      # תשובה מ-C חזרה ל-ACCC (אם C שולח חזרה)

      - from: "SUPERNOVA_AIR:Upstream"
        to: ["ACCC_IN:Downstream"]      # תשובה דרך SNV חזרה ל-ACCC

      # GCCC->ACCC (reverse)
      - from: "LOS_REV:Upstream"
        to: ["ACCC_OUT:Downstream"]     # LOS reverse -> Machine A

      - from: "SNV_REV:Upstream"
        to: ["ACCC_OUT:Downstream"]     # SNV reverse -> Machine A

  reconnect:
    intervalSeconds: 5
    maxAttempts: 0

  queue:
    maxSizePerConnection: 1000
    overflowPolicy: DropOldest

  socket:
    noDelay: true
    receiveBufferSize: 65536
    sendBufferSize: 65536
    keepAlive: true

  buffer:
    readBufferSize: 4096

logging:
  minimumLevel: Information
  console:
    enabled: true
  file:
    enabled: true
    path: "logs/fofi-air-3machine-.log"
    rollingInterval: Day
    retainedFileCount: 7

metrics:
  enabled: true
  reportIntervalSeconds: 10
  prometheus:
    enabled: false
    port: 9090

dashboard:
  enabled: true
  statusHost: "0.0.0.0"
  statusPort: 19001
  pushIntervalMs: 200
  commandPort: 19002
  upstreamLabel: "FOFI GROUND"
