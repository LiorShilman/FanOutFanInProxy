proxy:
  # ═══════════════════════════════════════════════════════════════════════════
  # FOFI GROUND — Single-Machine Loopback Test
  #
  # ACCC->GCCC (forward):
  #   FOFI AIR -> localhost:5200/5202 -> FOFI GROUND -> localhost:7000
  #
  # GCCC->ACCC (reverse):
  #   localhost:7100 -> FOFI GROUND -> localhost:5210/5212 -> FOFI AIR
  #
  # Run together with proxy-fofi-air-1machine.yaml and test-1machine.ps1
  # ═══════════════════════════════════════════════════════════════════════════

  channels:
    # ── ACCC->GCCC (forward) ─────────────────────────────────────────────────
    - name: LOS_IN
      upstream:
        protocol: Udp
        mode: Client
        host: "127.0.0.1"
        port: 7000
      downstream:
        protocol: Udp
        mode: Server
        listenIp: "0.0.0.0"
        port: 5200

    - name: SNV_IN
      upstream:
        protocol: Udp
        mode: Client
        host: "127.0.0.1"
        port: 7000
      downstream:
        protocol: Udp
        mode: Server
        listenIp: "0.0.0.0"
        port: 5202

    # ── GCCC->ACCC (reverse) ─────────────────────────────────────────────────
    - name: GCCC_IN
      upstream:
        protocol: Udp
        mode: Server
        listenIp: "0.0.0.0"
        port: 7100

    - name: LOS_LOWER
      downstream:
        protocol: Udp
        mode: Client
        host: "127.0.0.1"
        port: 5210

    - name: SNV_LOWER
      downstream:
        protocol: Udp
        mode: Client
        host: "127.0.0.1"
        port: 5212

  downstreams: []

  routing:
    rules:
      # ACCC->GCCC (forward)
      - from: "LOS_IN:Downstream"
        to: ["LOS_IN:Upstream"]

      - from: "LOS_IN:Upstream"
        to: ["LOS_IN:Downstream"]

      - from: "SNV_IN:Downstream"
        to: ["SNV_IN:Upstream"]

      - from: "SNV_IN:Upstream"
        to: ["SNV_IN:Downstream"]

      # GCCC->ACCC (reverse)
      - from: "GCCC_IN:Upstream"
        to: ["LOS_LOWER:Downstream"]    # LOS active by default

      - from: "LOS_LOWER:Upstream"
        to: ["GCCC_IN:Downstream"]      # symmetric — enables dashboard PATH detection

      - from: "SNV_LOWER:Upstream"
        to: ["GCCC_IN:Downstream"]      # symmetric — enables dashboard PATH detection

  reconnect:
    intervalSeconds: 3
    maxAttempts: 0

  queue:
    maxSizePerConnection: 1000
    overflowPolicy: DropOldest

  socket:
    noDelay: true
    receiveBufferSize: 65536
    sendBufferSize: 65536
    keepAlive: true

  buffer:
    readBufferSize: 4096

logging:
  minimumLevel: Information
  console:
    enabled: true
  file:
    enabled: true
    path: "logs/fofi-ground-1machine-.log"
    rollingInterval: Day
    retainedFileCount: 7

metrics:
  enabled: true
  reportIntervalSeconds: 10
  prometheus:
    enabled: false
    port: 9090

dashboard:
  enabled: true
  statusHost: "0.0.0.0"
  statusPort: 19011
  pushIntervalMs: 200
  commandPort: 19012
  upstreamLabel: "GCCC"
